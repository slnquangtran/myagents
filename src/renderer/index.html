<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CmdMana - Terminal Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button class="toolbar-btn" id="adminBtn" title="Run as Administrator">🛡️ Admin</button>
      <button class="toolbar-btn" id="defaultBtn" title="Set as Default Terminal">📌 Set as Default</button>
      <button class="toolbar-btn" id="newTabBtn" title="New Terminal">+ New Tab</button>
    </div>

    <div class="tab-bar" id="tabBar">
      <div class="tabs-container" id="tabsContainer"></div>
      <button class="add-tab-btn" id="newTabBtn2" title="New Terminal">+</button>
    </div>

    <div class="main-content">
      <div class="terminal-panel" id="terminalPanel">
        <div class="terminal-output" id="terminalOutput"></div>
        <div class="terminal-input-line">
          <span class="prompt">C:\&gt;</span>
          <input type="text" class="terminal-input" id="terminalInput" spellcheck="false">
        </div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-item" id="statusText">Ready</span>
      <span class="status-spacer"></span>
      <span class="status-item" id="tabCount">0 tabs</span>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
